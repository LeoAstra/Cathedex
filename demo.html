<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Cathedex</title>
  <style>
    :root {
      --bg: #09090b;
      --panel: #18181b;
      --panel-2: #0f0f12;
      --border: #27272a;
      --border-2: #3f3f46;
      --text: #fafafa;
      --muted: #a1a1aa;
      --muted-2: #71717a;
      --accent: #e4e4e7;
      --accent-text: #0a0a0a;
      --blue: rgba(59, 130, 246, 0.18);
      --rose: rgba(244, 63, 94, 0.18);
      --violet: rgba(139, 92, 246, 0.18);
      --emerald: rgba(16, 185, 129, 0.18);
      --amber: rgba(245, 158, 11, 0.18);
      --red: rgba(239, 68, 68, 0.18);
      --shadow: 0 20px 40px rgba(0,0,0,0.35);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    button, input, textarea { font: inherit; }
    body { min-height: 100vh; }
    .app { max-width: 1600px; margin: 0 auto; padding: 24px; }
    .hidden { display: none !important; }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      background: rgba(24,24,27,0.92);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
    }
    .title h1 { margin: 0; font-size: 32px; line-height: 1.1; }
    .title p { margin: 8px 0 0; color: var(--muted); font-size: 14px; }

    .view-switcher { display: flex; gap: 8px; }
    .tab-btn, .btn {
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 16px;
      cursor: pointer;
      transition: 0.2s ease;
    }
    .tab-btn:hover, .btn:hover { border-color: var(--border-2); transform: translateY(-1px); }
    .tab-btn.active { background: var(--accent); color: var(--accent-text); border-color: var(--accent); font-weight: 600; }
    .btn.light { background: var(--accent); color: var(--accent-text); border-color: var(--accent); font-weight: 600; }
    .btn.blue { background: var(--blue); color: #cfe3ff; }
    .btn.rose { background: var(--rose); color: #ffd2dd; }
    .btn.violet { background: var(--violet); color: #e8dcff; }
    .btn.emerald { background: var(--emerald); color: #d4fff0; }
    .btn.red { background: var(--red); color: #ffd8d8; }
    .btn.small { padding: 8px 12px; font-size: 12px; border-radius: 12px; }
    .btn.full { width: 100%; }

    .viewer-grid {
      display: grid;
      grid-template-columns: 320px minmax(640px, 1fr) 360px;
      gap: 24px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 20px;
      box-shadow: var(--shadow);
    }
    .panel h3 {
      margin: 0 0 16px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 12px;
      color: var(--muted);
    }

    .search-wrap { margin-bottom: 16px; }
    .search-wrap input {
      width: 100%;
      background: var(--panel-2);
      border: 1px solid var(--border-2);
      border-radius: 18px;
      color: var(--text);
      padding: 12px 14px;
      outline: none;
    }

    .sidebar-actions { display: flex; gap: 8px; margin-bottom: 16px; }
    .creature-list { display: grid; gap: 10px; max-height: 72vh; overflow-y: auto; padding-right: 4px; }
    .creature-item {
      border: 1px solid var(--border);
      background: var(--panel-2);
      border-radius: 18px;
      padding: 12px;
      cursor: pointer;
      transition: 0.2s ease;
    }
    .creature-item:hover { border-color: var(--border-2); }
    .creature-item.active { background: #27272a; border-color: #52525b; }
    .creature-name { font-weight: 700; }
    .creature-meta { margin-top: 6px; color: var(--muted); font-size: 12px; }

    .hero { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; }
    .hero h2 { margin: 0; font-size: 34px; }
    .hero p { margin: 6px 0 0; color: var(--muted); }
    .hero-controls { display: flex; gap: 10px; flex-wrap: wrap; }

    .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 18px; }
    .stat-card { background: var(--panel-2); border: 1px solid var(--border); border-radius: 18px; padding: 14px; }
    .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--muted); }
    .stat-value { margin-top: 8px; font-weight: 700; font-size: 18px; }
    .small-meta { font-size: 12px; color: var(--muted); margin-top: 4px; }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .info-row { padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px; line-height: 1.45; }
    .info-row:last-child { border-bottom: none; }
    .info-row strong { color: #d4d4d8; }
    .muted { color: var(--muted); }

    .attack-list, .log-list, .track-list, .builder-list { display: grid; gap: 12px; }
    .attack-card, .log-card, .track-card, .editor-card {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
    }
    .attack-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .attack-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .section-gap { margin-top: 22px; }
    .pill-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
    .condition-pill {
      border: 1px solid var(--border);
      background: #27272a;
      color: #d4d4d8;
      border-radius: 999px;
      padding: 7px 12px;
      cursor: pointer;
      font-size: 12px;
    }
    .condition-pill.active {
      background: var(--amber);
      color: #ffe7b0;
      border-color: rgba(245,158,11,0.35);
    }

    .input-group { margin-bottom: 14px; }
    .input-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
    }
    .input-group input,
    .input-group textarea {
      width: 100%;
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border-2);
      border-radius: 16px;
      padding: 10px 12px;
      outline: none;
    }
    .input-group textarea { min-height: 110px; resize: vertical; }
    .input-grid-2, .input-grid-3 { display: grid; gap: 12px; }
    .input-grid-2 { grid-template-columns: 1fr 1fr; }
    .input-grid-3 { grid-template-columns: repeat(3, 1fr); }

    .builder-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .builder-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 20px;
    }
    .builder-header h2 { margin: 0; font-size: 28px; }
    .builder-header p { margin: 6px 0 0; color: var(--muted); }
    .builder-actions { display: flex; gap: 8px; }

    .section-title { margin: 0 0 12px; font-size: 14px; font-weight: 700; color: #e4e4e7; }
    .inline-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .empty { color: var(--muted-2); font-size: 14px; }
    .roll-total { margin-top: 8px; font-weight: 700; font-size: 18px; }
    .formula-help { margin-top: 6px; color: var(--muted-2); font-size: 12px; }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="title">
        <h1>Pathfinder 1e Creature Manager</h1>
        <p>Dark-mode GM dashboard with creature viewer, rollers, combat tracking, editing, and a manual builder.</p>
      </div>
      <div class="view-switcher">
        <button id="viewerTab" class="tab-btn active">Creature Viewer</button>
        <button id="builderTab" class="tab-btn">Add Creature</button>
      </div>
    </header>

    <section id="viewerPage">
      <div class="viewer-grid">
        <aside class="panel">
          <div class="search-wrap"><input id="searchInput" type="text" placeholder="Search creatures..." /></div>
          <div class="sidebar-actions">
            <button id="exportBtn" class="btn full">Export JSON</button>
            <label class="btn full" style="text-align:center; display:flex; align-items:center; justify-content:center;">Import JSON<input id="importInput" type="file" accept="application/json" class="hidden" /></label>
          </div>
          <div id="creatureList" class="creature-list"></div>
        </aside>
        <main id="mainContent"></main>
        <aside id="rightSidebar"></aside>
      </div>
    </section>

    <section id="builderPage" class="hidden">
      <div class="panel">
        <div class="builder-header">
          <div>
            <h2 id="builderTitle">Add New Creature</h2>
            <p id="builderSubtitle">Manual Pathfinder 1e stat block builder with formulas and derived stats.</p>
          </div>
          <div class="builder-actions">
            <button id="builderCancel" class="btn">Cancel</button>
            <button id="builderSave" class="btn light">Save Creature</button>
          </div>
        </div>
        <div id="builderRoot"></div>
      </div>
    </section>
  </div>

        ],

          { name: "Detect Magic", uses: "at will", dc: "", formula: "" },
          { name: "Invisibility", uses: "at will (self only)", dc: "", formula: "" },
          { name: "Cause Fear", uses: "1/day", dc: "11", formula: "1d20" }
        ],

        abilities: { str: 8, dex: 17, con: 11, int: 11, wis: 12, cha: 10 },
        bab: 3,
        cmb: 1,
        cmd: 14,
        feats: "Weapon Finesse, Improved Initiative",
        skills: "Bluff +6, Fly +21, Intimidate +6, Knowledge (planes) +6, Perception +7, Stealth +21",
        languages: "Abyssal, Common",
        specialQualities: "change shape (bat, centipede, toad, wolf), fast healing 2",
        specialAbilitiesText: "Poison (Ex): Claw—injury; save Fort DC 13; frequency 1/round for 4 rounds; effect 1d2 Dex; cure 1 save.",
        conditions: [],
        abilityUses: [{ name: "Cause Fear", current: 1, max: 1 }],
        customButtons: [{ label: "Poison Save DC", formula: "DC 13" }],
        notes: ""
      }
    ];

    const conditionOptions = ["Blinded", "Dazed", "Entangled", "Fatigued", "Flat-Footed", "Frightened", "Grappled", "Invisible", "Panicked", "Paralyzed", "Pinned", "Prone", "Shaken", "Sickened", "Staggered", "Stunned"];

    const state = {
      creatures: JSON.parse(JSON.stringify(starterCreatures)),
      selectedId: starterCreatures[0].id,
      page: 'viewer',
      search: '',
      rollLog: [],
      formData: null,
      editingId: null
    };

    function defaultCreature() {
      return {
        id: `creature-${Date.now()}`,
        name: "",
        cr: "",
        xp: "",
        alignment: "",
        size: "",
        type: "",
        subtype: "",
        initiativeBase: 0,
        senses: "",
        perception: 0,
        aura: "",
        ac: { base: 10, touchBase: 10, flatFooted: 10 },
        hp: { base: 1, damageTaken: 0, hd: "1d8" },
        saves: { fort: 0, ref: 0, will: 0 },
        defensiveAbilities: "",
        dr: "",
        immunities: "",
        resistances: "",
        weaknesses: "",
        speed: "",
        space: "5 ft.",
        reach: "5 ft.",
        melee: [],
        ranged: [],
        specialAttacks: "",
        spellLikeAbilities: [],
        spells: "",
        abilities: { str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10 },
        bab: 0,
        cmb: 0,
        cmd: 10,
        feats: "",
        skills: "",
        languages: "",
        specialQualities: "",
        specialAbilitiesText: "",
        conditions: [],
        abilityUses: [],
        customButtons: [],
        notes: ""
      };
    }
    state.formData = defaultCreature();

    function clone(obj) { return JSON.parse(JSON.stringify(obj)); }
    function esc(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
    function signed(value) { const n = Number(value || 0); return n >= 0 ? `+${n}` : `${n}`; }
    function abilityMod(score) { return Math.floor((Number(score) - 10) / 2); }
    function hitDiceCount(hd) {
      const match = String(hd || '').trim().match(/^(\d+)d\d+/i);
      return match ? Number(match[1]) : 1;
    }
    function selectedCreature() { return state.creatures.find(c => c.id === state.selectedId) || state.creatures[0] || null; }
    function filteredCreatures() {
      const q = state.search.trim().toLowerCase();
      if (!q) return state.creatures;
      return state.creatures.filter(c => [c.name, c.type, c.alignment, c.cr].some(v => String(v || '').toLowerCase().includes(q)));
    }
    function getDerivedStats(c) {
      const dexMod = abilityMod(c.abilities.dex);
      const conMod = abilityMod(c.abilities.con);
      const wisMod = abilityMod(c.abilities.wis);
      const hdCount = hitDiceCount(c.hp.hd);
      const maxHp = Math.max(1, Number(c.hp.base || 0) + conMod * hdCount);
      const currentHp = Math.max(0, maxHp - Number(c.hp.damageTaken || 0));
      return {
        dexMod,
        conMod,
        wisMod,
        hdCount,
        initiative: Number(c.initiativeBase || 0) + dexMod,
        ac: {
          total: Number(c.ac.base || 0) + dexMod,
          touch: Number(c.ac.touchBase || 0) + dexMod,
          flatFooted: Number(c.ac.flatFooted || 0)
        },
        hp: { max: maxHp, current: currentHp },
        saves: {
          fort: Number(c.saves?.fort || 0) + conMod,
          ref: Number(c.saves?.ref || 0) + dexMod,
          will: Number(c.saves?.will || 0) + wisMod
        }
      };
    }

    function normalizeCreature(c) {
      const n = clone(c);
      if (n.ac && n.ac.total !== undefined && n.ac.base === undefined) {
        const dexMod = abilityMod(n.abilities?.dex ?? 10);
        n.ac = {
          base: Number(n.ac.total || 10) - dexMod,
          touchBase: Number(n.ac.touch || 10) - dexMod,
          flatFooted: Number(n.ac.flatFooted || 10)
        };
      }
      if (n.initiative !== undefined && n.initiativeBase === undefined) {
        n.initiativeBase = Number(n.initiative || 0) - abilityMod(n.abilities?.dex ?? 10);
        delete n.initiative;
      }
      if (n.hp && n.hp.max !== undefined && n.hp.base === undefined) {
        const conMod = abilityMod(n.abilities?.con ?? 10);
        const hdCount = hitDiceCount(n.hp.hd || '1d8');
        const max = Number(n.hp.max || 1);
        const current = Number(n.hp.current ?? max);
        n.hp = {
          base: max - conMod * hdCount,
          damageTaken: Math.max(0, max - current),
          hd: n.hp.hd || '1d8'
        };
      }
      if (!n.saves) {
        n.saves = { fort: 0, ref: 0, will: 0 };
      }
      n.saves = {
        fort: Number(n.saves.fort || 0),
        ref: Number(n.saves.ref || 0),
        will: Number(n.saves.will || 0)
      };
      n.melee = (n.melee || []).map(i => ({
        name: i.name || '',
        attackFormula: i.attackFormula || '1d20+STR',
        damageFormula: i.damageFormula || '1d6+STR',
        crit: i.crit || 'x2',
        notes: i.notes || ''
      }));
      n.ranged = (n.ranged || []).map(i => ({
        name: i.name || '',
        attackFormula: i.attackFormula || '1d20+DEX',
        damageFormula: i.damageFormula || '1d6',
        crit: i.crit || 'x2',
        notes: i.notes || ''
      }));
      n.spellLikeAbilities = (n.spellLikeAbilities || []).map(i => ({ name: i.name || '', uses: i.uses || '', dc: i.dc || '', formula: i.formula || i.roll || '' }));
      n.customButtons = (n.customButtons || []).map(i => ({ label: i.label || '', formula: i.formula || i.roll || '1d20' }));
      delete n.environment;
      delete n.organization;
      delete n.treasure;
      return n;
    }

    function rollDie(sides) { return Math.floor(Math.random() * sides) + 1; }

    function evaluateFormula(formula, creature) {
      const source = String(formula || '').trim();
      if (!source) return { valid: false, total: null, breakdown: 'No formula entered.' };
      const mods = {
        STR: abilityMod(creature.abilities.str),
        DEX: abilityMod(creature.abilities.dex),
        CON: abilityMod(creature.abilities.con),
        INT: abilityMod(creature.abilities.int),
        WIS: abilityMod(creature.abilities.wis),
        CHA: abilityMod(creature.abilities.cha),
        BAB: Number(creature.bab || 0),
        CMB: Number(creature.cmb || 0),
        CMD: Number(creature.cmd || 0)
      };
      const terms = source.toUpperCase().replace(/\s+/g, '').match(/[+-]?[^+-]+/g);
      if (!terms) return { valid: false, total: null, breakdown: source };
      let total = 0;
      const pieces = [];
      for (const term of terms) {
        const sign = term.startsWith('-') ? -1 : 1;
        const body = term.replace(/^[-+]/, '');
        const diceMatch = body.match(/^(\d*)D(\d+)$/);
        if (diceMatch) {
          const count = Number(diceMatch[1] || 1);
          const sides = Number(diceMatch[2]);
          const rolls = Array.from({ length: count }, () => rollDie(sides));
          total += sign * rolls.reduce((a, b) => a + b, 0);
          pieces.push(`${sign === -1 ? '-' : '+'}${count}d${sides}[${rolls.join(', ')}]`);
          continue;
        }
        if (mods[body] !== undefined) {
          total += sign * mods[body];
          pieces.push(`${sign === -1 ? '-' : '+'}${body}(${mods[body]})`);
          continue;
        }
        if (/^\d+$/.test(body)) {
          total += sign * Number(body);
          pieces.push(`${sign === -1 ? '-' : '+'}${body}`);
          continue;
        }
        return { valid: false, total: null, breakdown: source };
      }
      return { valid: true, total, breakdown: `${source} => ${pieces.join(' ').replace(/^\+/, '')} = ${total}` };
    }

    function addRollLog(title, result) {
      state.rollLog.unshift({ id: Date.now() + Math.random(), title, ...result });
      state.rollLog = state.rollLog.slice(0, 20);
      render();
    }

    function updateSelectedCreature(mutator) {
      state.creatures = state.creatures.map(c => {
        if (c.id !== state.selectedId) return c;
        const copy = clone(c);
        mutator(copy);
        return copy;
      });
      render();
    }

    function resetSelectedCreature() {
      const original = starterCreatures.find(c => c.id === state.selectedId);
      if (original) {
        state.creatures = state.creatures.map(c => c.id === state.selectedId ? normalizeCreature(original) : c);
      } else {
        updateSelectedCreature(c => {
          c.hp.damageTaken = 0;
          c.conditions = [];
          c.abilityUses = c.abilityUses.map(u => ({ ...u, current: u.max }));
        });
        return;
      }
      render();
    }

    function exportJson() {
      const blob = new Blob([JSON.stringify(state.creatures, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'pathfinder-creatures.json';
      a.click();
      URL.revokeObjectURL(url);
    }

    function importJson(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const parsed = JSON.parse(String(e.target.result || '[]'));
          if (!Array.isArray(parsed)) throw new Error('JSON must be an array of creatures.');
          state.creatures = parsed.map(normalizeCreature);
          state.selectedId = state.creatures[0]?.id || null;
          render();
        } catch (err) {
          alert(`Import failed: ${err.message}`);
        }
      };
      reader.readAsText(file);
    }

    function infoRow(label, value) {
      if (!value && value !== 0) return '';
      return `<div class="info-row"><strong>${esc(label)}:</strong> <span class="muted">${esc(value)}</span></div>`;
    }

    function renderCreatureList() {
      const list = document.getElementById('creatureList');
      const creatures = filteredCreatures();
      list.innerHTML = creatures.map(c => `<div class="creature-item ${c.id === state.selectedId ? 'active' : ''}" data-id="${esc(c.id)}"><div class="creature-name">${esc(c.name)}</div><div class="creature-meta">CR ${esc(c.cr)} • ${esc(c.alignment)} • ${esc(c.size)} ${esc(c.type)}</div></div>`).join('') || `<div class="empty">No creatures found.</div>`;
      list.querySelectorAll('.creature-item').forEach(item => item.addEventListener('click', () => { state.selectedId = item.dataset.id; render(); }));
    }

    function renderAttackSection(title, items, kind) {
      if (!items.length) return `<div class="section-gap"><div class="section-title">${esc(title)}</div><div class="empty">No ${title.toLowerCase()} attacks.</div></div>`;
      return `<div class="section-gap"><div class="section-title">${esc(title)}</div><div class="attack-list">${items.map((item, index) => `<div class="attack-card"><div class="attack-row"><div><div><strong>${esc(item.name)}</strong></div><div class="small-meta">Atk ${esc(item.attackFormula)} • Dmg ${esc(item.damageFormula)} • Crit ${esc(item.crit || '—')}${item.notes ? ` • ${esc(item.notes)}` : ''}</div></div><div class="attack-actions"><button class="btn blue small" data-action="attack" data-kind="${esc(kind)}" data-index="${index}">Attack</button><button class="btn rose small" data-action="damage" data-kind="${esc(kind)}" data-index="${index}">Damage</button></div></div></div>`).join('')}</div></div>`;
    }

c.aura)}${infoRow('Defensive Abilities', c.defensiveAbilities)}${infoRow('DR', c.dr)}${infoRow('Immunities', c.immunities)}${infoRow('Resistances', c.resistances)}${infoRow('Weaknesses', c.weaknesses)}</div><div class="panel"><h3>Offense</h3>${infoRow('Speed', c.speed)}${infoRow('Space', c.space)}${infoRow('Reach', c.reach)}${infoRow('Special Attacks', c.specialAttacks)}${infoRow('Spells', c.spells)}</div></div><div class="panel section-gap"><h3>Attacks & Rollers</h3>${renderAttackSection('Melee', c.melee, 'melee')}${renderAttackSection('Ranged', c.ranged, 'ranged')}<div class="section-gap"><div class="section-title">Spell-Like Abilities</div><div class="attack-list">${c.spellLikeAbilities.length ? c.spellLikeAbilities.map((sla, index) => `<div class="attack-card"><div class="attack-row"><div><div><strong>${esc(sla.name)}</strong></div><div class="small-meta">Uses: ${esc(sla.uses || '—')}${sla.dc ? ` • DC ${esc(sla.dc)}` : ''}${sla.formula ? ` • ${esc(sla.formula)}` : ''}</div></div><div class="attack-actions">${sla.formula ? `<button class="btn violet small" data-action="sla-roll" data-index="${index}">Roll</button>` : ''}</div></div></div>`).join('') : `<div class="empty">No spell-like abilities.</div>`}</div></div><div class="section-gap"><div class="section-title">Custom Buttons</div><div class="pill-wrap">${c.customButtons.length ? c.customButtons.map((b, index) => `<button class="btn emerald" data-action="custom-roll" data-index="${index}">${esc(b.label)}</button>`).join('') : `<div class="empty">No custom buttons.</div>`}</div></div></div><div class="two-col section-gap"><div class="panel"><h3>Statistics</h3><div class="input-grid-3">${Object.entries(c.abilities).map(([k,v]) => `<div class="stat-card" style="text-align:center;"><div class="stat-label">${esc(k.toUpperCase())}</div><div class="stat-value">${esc(v)}</div><div class="small-meta">mod ${esc(signed(abilityMod(v)))}</div></div>`).join('')}</div><div class="section-gap">${infoRow('Base Atk', signed(c.bab))}${infoRow('CMB', signed(c.cmb))}${infoRow('CMD', c.cmd)}${infoRow('Feats', c.feats)}${infoRow('Skills', c.skills)}${infoRow('Languages', c.languages)}${infoRow('SQ', c.specialQualities)}</div></div><div class="panel"><h3>Notes</h3>${infoRow('Special Abilities', c.specialAbilitiesText)}${infoRow('Notes', c.notes)}</div></div>`;

      document.getElementById('rollInitBtn').addEventListener('click', () => addRollLog(`${c.name} - Initiative`, evaluateFormula(`1d20+DEX${Number(c.initiativeBase) >= 0 ? '+' : ''}${Number(c.initiativeBase)}`, c)));
      document.getElementById('rollFortBtn').addEventListener('click', () => {
        const die = rollDie(20);

          valid: true,

        addRollLog(`${c.name} - Reflex Save`, {
          valid: true,
          total: die + d.saves.ref,
          breakdown: `1d20[${die}] + Ref ${signed(d.saves.ref)} = ${die + d.saves.ref}`

`<div class="empty">Your recent dice rolls will appear here.</div>`}</div></div>`;

    function builderInput(label, path, value, type='text', help='') {
      return `<div class="input-group"><label>${esc(label)}</label><input type="${esc(type)}" value="${esc(value)}" data-path="${esc(path)}" />${help ? `<div class="formula-help">${esc(help)}</div>` : ''}</div>`;

      return `<div class="input-group"><label>${esc(label)}</label><textarea data-path="${esc(path)}">${esc(value)}</textarea></div>`;

      const keys = path.split('.');
      let ref = state.formData;
      for (let i = 0; i < keys.length - 1; i++) ref = ref[keys[i]];
      ref[keys[keys.length - 1]] = value;
    }

    }

f.specialAttacks)}${builderInput('Spells','spells',f.spells)}<div class="section-gap"><div class="inline-actions"><div class="section-title">Melee Attacks</div><button class="btn small" id="addMeleeBtn">Add</button></div><div class="builder-list">${f.melee.length ? f.melee.map((item,index) => attackEditor(item,'melee',index)).join('') : `<div class="empty">No melee attacks added.</div>`}</div></div><div class="section-gap"><div class="inline-actions"><div class="section-title">Ranged Attacks</div><button class="btn small" id="addRangedBtn">Add</button></div><div class="builder-list">${f.ranged.length ? f.ranged.map((item,index) => attackEditor(item,'ranged',index)).join('') : `<div class="empty">No ranged attacks added.</div>`}</div></div><div class="section-gap"><div class="inline-actions"><div class="section-title">Spell-Like Abilities</div><button class="btn small" id="addSlaBtn">Add</button></div><div class="builder-list">${f.spellLikeAbilities.length ? f.spellLikeAbilities.map((item,index) => `<div class="editor-card input-grid-2">${builderInput('Name', `spellLikeAbilities.${index}.name`, item.name)}${builderInput('Uses', `spellLikeAbilities.${index}.uses`, item.uses)}${builderInput('DC', `spellLikeAbilities.${index}.dc`, item.dc)}${builderInput('Formula', `spellLikeAbilities.${index}.formula`, item.formula, 'text', 'Supports dice and STR/DEX/CON/INT/WIS/CHA/BAB/CMB/CMD.')}</div>`).join('') : `<div class="empty">No spell-like abilities added.</div>`}</div></div></div><div class="panel"><h3>Statistics & Extras</h3><div class="input-grid-2">${builderInput('STR','abilities.str',f.abilities.str,'number')}${builderInput('DEX','abilities.dex',f.abilities.dex,'number')}${builderInput('CON','abilities.con',f.abilities.con,'number')}${builderInput('INT','abilities.int',f.abilities.int,'number')}${builderInput('WIS','abilities.wis',f.abilities.wis,'number')}${builderInput('CHA','abilities.cha',f.abilities.cha,'number')}${builderInput('BAB','bab',f.bab,'number')}${builderInput('CMB','cmb',f.cmb,'number')}${builderInput('CMD','cmd',f.cmd,'number')}${builderInput('Feats','feats',f.feats)}${builderInput('Skills','skills',f.skills)}${builderInput('Languages','languages',f.languages)}${builderInput('SQ','specialQualities',f.specialQualities)}</div>${builderTextarea('Special Abilities Text','specialAbilitiesText',f.specialAbilitiesText)}${builderTextarea('Notes','notes',f.notes)}<div class="section-gap"><div class="inline-actions"><div class="section-title">Tracked Ability Uses</div><button class="btn small" id="addAbilityUseBtn">Add</button></div><div class="builder-list">${f.abilityUses.length ? f.abilityUses.map((item,index) => `<div class="editor-card input-grid-3">${builderInput('Name', `abilityUses.${index}.name`, item.name)}${builderInput('Current', `abilityUses.${index}.current`, item.current, 'number')}${builderInput('Max', `abilityUses.${index}.max`, item.max, 'number')}</div>`).join('') : `<div class="empty">No tracked abilities added.</div>`}</div></div><div class="section-gap"><div class="inline-actions"><div class="section-title">Custom Roll Buttons</div><button class="btn small" id="addCustomBtn">Add</button></div><div class="builder-list">${f.customButtons.length ? f.customButtons.map((item,index) => `<div class="editor-card input-grid-2">${builderInput('Label', `customButtons.${index}.label`, item.label)}${builderInput('Formula', `customButtons.${index}.formula`, item.formula, 'text', 'Supports dice and STR/DEX/CON/INT/WIS/CHA/BAB/CMB/CMD.')}</div>`).join('') : `<div class="empty">No custom buttons added.</div>`}</div></div></div></div>`;

      root.querySelectorAll('[data-path]').forEach(el => el.addEventListener('input', e => setFormValue(e.target.dataset.path, e.target.type === 'number' ? Number(e.target.value || 0) : e.target.value)));

    function startEditingCreature(id) {
      const creature = state.creatures.find(c => c.id === id);
      if (!creature) return;
      state.formData = clone(creature);
      state.editingId = id;
      state.page = 'builder';
      render();
    }

    function saveCreature() {
      const payload = normalizeCreature(clone(state.formData));
      if (!payload.name.trim()) { alert('Creature name is required.'); return; }
      if (!payload.id) payload.id = `creature-${Date.now()}`;
      const index = state.creatures.findIndex(c => c.id === payload.id);
      if (index >= 0) state.creatures[index] = payload; else state.creatures.push(payload);
      state.selectedId = payload.id;
      state.formData = defaultCreature();
      state.editingId = null;
      state.page = 'viewer';
      render();
    }

    function setPage(page) { state.page = page; render(); }
    function render() {
      document.getElementById('viewerPage').classList.toggle('hidden', state.page !== 'viewer');
      document.getElementById('builderPage').classList.toggle('hidden', state.page !== 'builder');
      document.getElementById('viewerTab').classList.toggle('active', state.page === 'viewer');
      document.getElementById('builderTab').classList.toggle('active', state.page === 'builder');
      document.getElementById('searchInput').value = state.search;
      renderCreatureList();
      renderMainContent();
      renderRightSidebar();
      renderBuilder();
    }

    state.creatures = state.creatures.map(normalizeCreature);
    document.getElementById('viewerTab').addEventListener('click', () => setPage('viewer'));
    document.getElementById('builderTab').addEventListener('click', () => { state.formData = defaultCreature(); state.editingId = null; setPage('builder'); });
    document.getElementById('searchInput').addEventListener('input', e => { state.search = e.target.value; renderCreatureList(); });
    document.getElementById('exportBtn').addEventListener('click', exportJson);
    document.getElementById('importInput').addEventListener('change', e => { const file = e.target.files?.[0]; if (file) importJson(file); e.target.value = ''; });
    document.getElementById('builderCancel').addEventListener('click', () => { state.formData = defaultCreature(); state.editingId = null; setPage('viewer'); });
    document.getElementById('builderSave').addEventListener('click', saveCreature);
    render();
  </script>
</body>
</html>
