<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pathfinder 1e Creature Manager</title>
  <style>
    :root {
      --bg: #09090b;
      --panel: #18181b;
      --panel-2: #0f0f12;
      --border: #27272a;
      --border-2: #3f3f46;
      --text: #fafafa;
      --muted: #a1a1aa;
      --muted-2: #71717a;
      --accent: #e4e4e7;
      --accent-text: #0a0a0a;
      --blue: rgba(59, 130, 246, 0.18);
      --rose: rgba(244, 63, 94, 0.18);
      --violet: rgba(139, 92, 246, 0.18);
      --emerald: rgba(16, 185, 129, 0.18);
      --amber: rgba(245, 158, 11, 0.18);
      --red: rgba(239, 68, 68, 0.18);
      --shadow: 0 20px 40px rgba(0,0,0,0.35);
      --radius-xl: 18px;
      --radius-2xl: 24px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    button, input, textarea, select { font: inherit; }
    body { min-height: 100vh; }
    .app { max-width: 1600px; margin: 0 auto; padding: 24px; }
    .hidden { display: none !important; }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      background: rgba(24,24,27,0.92);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
    }

    .title h1 { margin: 0; font-size: 32px; line-height: 1.1; }
    .title p { margin: 8px 0 0; color: var(--muted); font-size: 14px; }

    .view-switcher { display: flex; gap: 8px; }
    .tab-btn, .btn {
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 16px;
      cursor: pointer;
      transition: 0.2s ease;
    }
    .tab-btn:hover, .btn:hover { border-color: var(--border-2); transform: translateY(-1px); }
    .tab-btn.active { background: var(--accent); color: var(--accent-text); border-color: var(--accent); font-weight: 600; }
    .btn.light { background: var(--accent); color: var(--accent-text); border-color: var(--accent); font-weight: 600; }
    .btn.blue { background: var(--blue); color: #cfe3ff; }
    .btn.rose { background: var(--rose); color: #ffd2dd; }
    .btn.violet { background: var(--violet); color: #e8dcff; }
    .btn.emerald { background: var(--emerald); color: #d4fff0; }
    .btn.red { background: var(--red); color: #ffd8d8; }
    .btn.small { padding: 8px 12px; font-size: 12px; border-radius: 12px; }
    .btn.tiny { padding: 6px 10px; font-size: 12px; border-radius: 999px; }
    .btn.full { width: 100%; }

    .viewer-grid {
      display: grid;
      grid-template-columns: 320px minmax(640px, 1fr) 360px;
      gap: 24px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 20px;
      box-shadow: var(--shadow);
    }

    .panel h3 {
      margin: 0 0 16px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 12px;
      color: var(--muted);
    }

    .search-wrap { position: relative; margin-bottom: 16px; }
    .search-wrap input {
      width: 100%;
      background: var(--panel-2);
      border: 1px solid var(--border-2);
      border-radius: 18px;
      color: var(--text);
      padding: 12px 14px;
      outline: none;
    }

    .sidebar-actions { display: flex; gap: 8px; margin-bottom: 16px; }
    .creature-list { display: grid; gap: 10px; max-height: 72vh; overflow-y: auto; padding-right: 4px; }
    .creature-item {
      border: 1px solid var(--border);
      background: var(--panel-2);
      border-radius: 18px;
      padding: 12px;
      cursor: pointer;
      transition: 0.2s ease;
    }
    .creature-item:hover { border-color: var(--border-2); }
    .creature-item.active { background: #27272a; border-color: #52525b; }
    .creature-name { font-weight: 700; }
    .creature-meta { margin-top: 6px; color: var(--muted); font-size: 12px; }

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }
    .hero h2 { margin: 0; font-size: 34px; }
    .hero p { margin: 6px 0 0; color: var(--muted); }
    .hero-controls { display: flex; gap: 10px; flex-wrap: wrap; }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-top: 18px;
    }
    .stat-card {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
    }
    .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--muted); }
    .stat-value { margin-top: 8px; font-weight: 700; font-size: 18px; }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .info-row {
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      line-height: 1.45;
    }
    .info-row:last-child { border-bottom: none; }
    .info-row strong { color: #d4d4d8; }
    .muted { color: var(--muted); }

    .attack-list, .log-list, .track-list, .builder-list { display: grid; gap: 12px; }
    .attack-card, .log-card, .track-card, .editor-card {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
    }
    .attack-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .attack-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .small-meta { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .section-gap { margin-top: 22px; }
    .pill-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
    .condition-pill {
      border: 1px solid var(--border);
      background: #27272a;
      color: #d4d4d8;
      border-radius: 999px;
      padding: 7px 12px;
      cursor: pointer;
      font-size: 12px;
    }
    .condition-pill.active {
      background: var(--amber);
      color: #ffe7b0;
      border-color: rgba(245,158,11,0.35);
    }

    .input-group { margin-bottom: 14px; }
    .input-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
    }
    .input-group input,
    .input-group textarea,
    .input-group select {
      width: 100%;
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border-2);
      border-radius: 16px;
      padding: 10px 12px;
      outline: none;
    }
    .input-group textarea { min-height: 110px; resize: vertical; }
    .input-grid-2, .input-grid-3 { display: grid; gap: 12px; }
    .input-grid-2 { grid-template-columns: 1fr 1fr; }
    .input-grid-3 { grid-template-columns: repeat(3, 1fr); }

    .builder-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    .builder-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 20px;
    }
    .builder-header h2 { margin: 0; font-size: 28px; }
    .builder-header p { margin: 6px 0 0; color: var(--muted); }
    .builder-actions { display: flex; gap: 8px; }

    .section-title {
      margin: 0 0 12px;
      font-size: 14px;
      font-weight: 700;
      color: #e4e4e7;
    }
    .inline-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .subtle { color: var(--muted); font-size: 13px; }
    .empty { color: var(--muted-2); font-size: 14px; }
    .roll-total { margin-top: 8px; font-weight: 700; font-size: 18px; }

    @media (max-width: 1400px) {
      .viewer-grid { grid-template-columns: 280px 1fr 320px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="title">
        <h1>The Cathedex</h1>
        <p>Dark-mode GM dashboard with creature viewer, rollers, combat tracking, and a manual builder.</p>
      </div>
      <div class="view-switcher">
        <button id="viewerTab" class="tab-btn active">Creature Viewer</button>
        <button id="builderTab" class="tab-btn">Add Creature</button>
      </div>
    </header>

    <section id="viewerPage">
      <div class="viewer-grid">
        <aside class="panel">
          <div class="search-wrap">
            <input id="searchInput" type="text" placeholder="Search creatures..." />
          </div>
          <div class="sidebar-actions">
            <button id="exportBtn" class="btn full">Export JSON</button>
            <label class="btn full" style="text-align:center; display:flex; align-items:center; justify-content:center;">
              Import JSON
              <input id="importInput" type="file" accept="application/json" class="hidden" />
            </label>
          </div>
          <div id="creatureList" class="creature-list"></div>
        </aside>

        <main id="mainContent"></main>

        <aside id="rightSidebar"></aside>
      </div>
    </section>

    <section id="builderPage" class="hidden">
      <div class="panel">
        <div class="builder-header">
          <div>
            <h2>Add New Creature</h2>
            <p>Manual Pathfinder 1e stat block builder.</p>
          </div>
          <div class="builder-actions">
            <button id="builderCancel" class="btn">Cancel</button>
            <button id="builderSave" class="btn light">Save Creature</button>
          </div>
        </div>
        <div id="builderRoot"></div>
      </div>
    </section>
  </div>

        ],

          { name: "Invisibility", uses: "at will (self only)", dc: "", roll: "" },
          { name: "Cause Fear", uses: "1/day", dc: "11", roll: "1d20+0" }
        ],
        spells: "",

        bab: 3,
        cmb: 1,
        cmd: 14,
        feats: "Weapon Finesse, Improved Initiative",
        skills: "Bluff +6, Fly +21, Intimidate +6, Knowledge (planes) +6, Perception +7, Stealth +21",
        languages: "Abyssal, Common",
        specialQualities: "change shape (bat, centipede, toad, wolf), fast healing 2",
        environment: "any",
        organization: "solitary or gang (2-5)",
        treasure: "none",
        specialAbilitiesText: "Poison (Ex): Claw—injury; save Fort DC 13; frequency 1/round for 4 rounds; effect 1d2 Dex; cure 1 save.",
        conditions: [],
        abilityUses: [
          { name: "Cause Fear", current: 1, max: 1 }
        ],

          { label: "Poison Save DC", roll: "DC 13", type: "custom" }
        ],
        notes: ""
      }
    ];

    const conditionOptions = ["Blinded", "Dazed", "Entangled", "Fatigued", "Flat-Footed", "Frightened", "Grappled", "Invisible", "Panicked", "Paralyzed", "Pinned", "Prone", "Shaken", "Sickened", "Staggered", "Stunned"];

    const state = {
      creatures: deepClone(starterCreatures).map(normalizeCreature),
      selectedId: starterCreatures[0].id,
      page: 'viewer',
      search: '',
      rollLog: [],
      formData: defaultCreature()
    };

    function defaultCreature() {
      return {
        id: `creature-${Date.now()}`,
        name: "",
        cr: "",
        xp: "",
        alignment: "",
        size: "",
        type: "",
        subtype: "",
        initiative: 0,
        senses: "",
        perception: 0,
        aura: "",
        ac: { total: 10, touch: 10, flatFooted: 10 },
        hp: { max: 1, current: 1, hd: "1d8" },
        saves: { fortBase: 0, refBase: 0, willBase: 0 },
        defensiveAbilities: "",
        dr: "",
        immunities: "",
        resistances: "",
        weaknesses: "",
        speed: "",
        space: "5 ft.",
        reach: "5 ft.",
        melee: [],
        ranged: [],
        specialAttacks: "",
        spellLikeAbilities: [],
        spells: "",
        abilities: { str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10 },
        bab: 0,
        cmb: 0,
        cmd: 10,
        feats: "",
        skills: "",
        languages: "",
        specialQualities: "",
        environment: "",
        organization: "",
        treasure: "",
        specialAbilitiesText: "",
        conditions: [],
        abilityUses: [],
        customButtons: [],
        notes: ""
      };
    }

    function deepClone(obj) {
      return JSON.parse(JSON.stringify(obj));
    }

    function signed(value) {
      const n = Number(value || 0);
      return n >= 0 ? `+${n}` : `${n}`;
    }

    function selectedCreature() {
      return state.creatures.find(c => c.id === state.selectedId) || state.creatures[0] || null;
    }

    function normalizeCreature(creature) {
      const next = deepClone(creature);
      if (next.saves && next.saves.fortBase === undefined) {
        next.saves = {
          fortBase: Number(next.saves.fort || 0) - abilityMod(next.abilities?.con ?? 10),
          refBase: Number(next.saves.ref || 0) - abilityMod(next.abilities?.dex ?? 10),
          willBase: Number(next.saves.will || 0) - abilityMod(next.abilities?.wis ?? 10)
        };
      }
      return next;
    }

    function getDerivedSaves(creature) {
      return {
        fort: Number(creature.saves.fortBase || 0) + abilityMod(creature.abilities.con),
        ref: Number(creature.saves.refBase || 0) + abilityMod(creature.abilities.dex),
        will: Number(creature.saves.willBase || 0) + abilityMod(creature.abilities.wis)
      };
    }

    function filteredCreatures() {
      const q = state.search.trim().toLowerCase();
      if (!q) return state.creatures;
      return state.creatures.filter(c => [c.name, c.type, c.alignment, c.cr].some(v => String(v || '').toLowerCase().includes(q)));
    }

    function rollDie(sides) {
      return Math.floor(Math.random() * sides) + 1;
    }

    function parseDiceExpression(expression) {
      const cleaned = String(expression || '').replace(/\s+/g, '');
      const match = cleaned.match(/^(\d*)d(\d+)([+-]\d+)?$/i);
      if (!match) return null;
      return {
        count: Number(match[1] || 1),
        sides: Number(match[2]),
        modifier: Number(match[3] || 0)
      };
    }

    function executeDiceRoll(expression) {
      const parsed = parseDiceExpression(expression);
      if (!parsed) return { total: null, breakdown: expression, valid: false };
      const rolls = Array.from({ length: parsed.count }, () => rollDie(parsed.sides));
      const total = rolls.reduce((a, b) => a + b, 0) + parsed.modifier;
      const modifierText = parsed.modifier === 0 ? '' : parsed.modifier > 0 ? ` + ${parsed.modifier}` : ` - ${Math.abs(parsed.modifier)}`;
      return {
        total,
        valid: true,
        breakdown: `${parsed.count}d${parsed.sides}: [${rolls.join(', ')}]${modifierText} = ${total}`
      };
    }

    function addRollLog(title, result) {
      state.rollLog.unshift({ id: Date.now() + Math.random(), title, ...result });
      state.rollLog = state.rollLog.slice(0, 20);
      render();
    }

    function updateSelectedCreature(mutator) {
      state.creatures = state.creatures.map(c => {
        if (c.id !== state.selectedId) return c;
        const copy = deepClone(c);
        mutator(copy);
        return copy;
      });
      render();
    }

    function resetSelectedCreature() {
      const original = starterCreatures.find(c => c.id === state.selectedId);
      if (original) {
        state.creatures = state.creatures.map(c => c.id === state.selectedId ? deepClone(original) : c);
      } else {
        updateSelectedCreature(c => {
          c.hp.current = c.hp.max;
          c.conditions = [];
          c.abilityUses = c.abilityUses.map(u => ({ ...u, current: u.max }));
        });
        return;
      }
      render();
    }

    function exportJson() {
      const blob = new Blob([JSON.stringify(state.creatures, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'pathfinder-creatures.json';
      a.click();
      URL.revokeObjectURL(url);
    }

    function importJson(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const parsed = JSON.parse(String(e.target.result || '[]'));
          if (!Array.isArray(parsed)) throw new Error('JSON must be an array of creatures.');
          state.creatures = parsed.map(normalizeCreature);
          state.selectedId = parsed[0]?.id || null;
          render();
        } catch (err) {
          alert(`Import failed: ${err.message}`);
        }
      };
      reader.readAsText(file);
    }

    function rollAttack(section, item) {
      const creature = selectedCreature();
      const result = executeDiceRoll(`1d20${item.attackBonus >= 0 ? '+' : ''}${item.attackBonus}`);
      addRollLog(`${creature.name} - ${section}: ${item.name}`, result);
    }

    function rollDamage(section, item) {
      const creature = selectedCreature();
      const expr = `${item.damage}${item.damageBonus ? item.damageBonus > 0 ? '+' + item.damageBonus : item.damageBonus : ''}`;
      const result = executeDiceRoll(expr);
      addRollLog(`${creature.name} - ${section} damage: ${item.name}`, result);
    }

    function rollInitiative() {
      const creature = selectedCreature();
      const result = executeDiceRoll(`1d20${creature.initiative >= 0 ? '+' : ''}${creature.initiative}`);
      addRollLog(`${creature.name} - Initiative`, result);
    }

    function rollCustom(label, roll) {
      const creature = selectedCreature();
      const result = executeDiceRoll(roll);
      addRollLog(`${creature.name} - ${label}`, result.valid ? result : { total: null, breakdown: roll, valid: false });
    }

    function abilityMod(score) {

        .replace(/</g, '&lt;')

        .replace(/"/g, '&quot;')

    function saveCreature() {
      const payload = deepClone(state.formData);
      if (!payload.name.trim()) {
        alert('Creature name is required.');
        return;
      }
      if (!payload.id) payload.id = `creature-${Date.now()}`;
      payload.hp.current = payload.hp.max;
      payload.saves = normalizeCreature(payload).saves;

      const existingIndex = state.creatures.findIndex(c => c.id === payload.id);
      if (existingIndex >= 0) state.creatures[existingIndex] = payload;
      else state.creatures.push(payload);

      state.selectedId = payload.id;
      state.formData = defaultCreature();
      state.page = 'viewer';
      render();
    }

    function setPage(page) {
      state.page = page;
      render();
    }

    function bindGlobalEvents() {
      document.getElementById('viewerTab').addEventListener('click', () => setPage('viewer'));
      document.getElementById('builderTab').addEventListener('click', () => setPage('builder'));
      document.getElementById('searchInput').addEventListener('input', (e) => {
        state.search = e.target.value;
        renderCreatureList();
      });
      document.getElementById('exportBtn').addEventListener('click', exportJson);
      document.getElementById('importInput').addEventListener('change', (e) => {
        const file = e.target.files?.[0];
        if (file) importJson(file);
        e.target.value = '';
      });
      document.getElementById('builderCancel').addEventListener('click', () => {
        state.formData = defaultCreature();
        setPage('viewer');
      });
      document.getElementById('builderSave').addEventListener('click', saveCreature);
    }

    function render() {
      document.getElementById('viewerPage').classList.toggle('hidden', state.page !== 'viewer');
      document.getElementById('builderPage').classList.toggle('hidden', state.page !== 'builder');
      document.getElementById('viewerTab').classList.toggle('active', state.page === 'viewer');
      document.getElementById('builderTab').classList.toggle('active', state.page === 'builder');
      document.getElementById('searchInput').value = state.search;
      renderCreatureList();
      renderMainContent();
      renderRightSidebar();
      renderBuilder();
    }

    bindGlobalEvents();
    render();
  </script>
</body>
</html>
